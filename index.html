<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer" />
    <title>❤️老婆大人专属空间❤️</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧸</text></svg>">
    <style>
        /* 基础样式重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif; 
            background-color: #fdfbf7; 
            color: #333; 
            -webkit-tap-highlight-color: transparent; /* 去除移动端点击高亮 */
        }

        /* 顶部导航与上传区域 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        h1 { font-size: 24px; font-weight: 600; color: #554c49; }
        
        /* 上传按钮 */
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .btn {
            border: none;
            color: white;
            background-color: #ff8fa3; 
            padding: 10px 24px;
            border-radius: 20px; 
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 143, 163, 0.3);
        }
        .btn:hover { 
            background-color: #ff708a; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 143, 163, 0.4);
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%;
        }

        /* 瀑布流布局 */
        .gallery {
            column-count: 3; 
            column-gap: 20px;
            padding: 30px 5%;
        }
        .gallery-item {
            break-inside: avoid; 
            margin-bottom: 20px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer; 
        }
        .gallery-item:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 12px 25px rgba(0,0,0,0.12);
        }
        .gallery-item img {
            width: 100%; height: auto; display: block;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }

        /* ================= 升级后的放大查看模态框 ================= */
        .modal {
            display: flex; position: fixed; z-index: 999;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.95);
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            user-select: none;
        }
        .modal.show { opacity: 1; visibility: visible; }
        
        .modal-content-wrapper {
            position: relative; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; 
        }

        .modal img {
            max-width: 95%; max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            object-fit: contain; 
            transform: scale(0.8);
            transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
        }
        .modal.show img { transform: scale(1); }

        /* 关闭按钮 */
        .close-btn {
            position: absolute; top: 20px; right: 25px;
            color: rgba(255,255,255,0.8); font-size: 35px; font-weight: bold;
            cursor: pointer; transition: color 0.3s; z-index: 1001;
            padding: 10px; /* 增加移动端点击热区 */
        }
        .close-btn:hover { color: #ff8fa3; }

        /* 左右导航箭头 */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.6); font-size: 50px;
            cursor: pointer; transition: 0.3s;
            padding: 20px; z-index: 1000;
        }
        .nav-btn:hover { color: #ff8fa3; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .nav-prev { left: 20px; }
        .nav-next { right: 20px; }

        /* 底部工具栏 */
        .modal-toolbar {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px;
            background: rgba(40, 40, 40, 0.85);
            padding: 12px 25px; border-radius: 30px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white; font-size: 15px; z-index: 1001;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        .toolbar-item { cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; padding: 5px; }
        .toolbar-item:hover { color: #ff8fa3; }
        .toolbar-divider { width: 1px; height: 16px; background: rgba(255,255,255,0.3); }
        .img-counter { font-weight: bold; letter-spacing: 1px; }

        /* ================= 响应式设计 (重点适配手机端) ================= */
        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { 
            .gallery { column-count: 1; padding: 20px 5%; }
            header { padding: 12px 5%; }
            h1 { font-size: 18px; }
            .btn { padding: 8px 18px; font-size: 14px; }
            
            /* 手机端隐藏左右箭头，靠滑动切换 */
            .nav-btn { display: none; }
            
            /* 手机端调整底部工具栏，隐藏文字只留图标，防止换行 */
            .modal-toolbar { gap: 15px; padding: 10px 20px; bottom: 20px; width: max-content;}
            .tb-text { display: none; } /* 隐藏文字说明 */
            .toolbar-item { font-size: 20px; } /* 调大图标尺寸 */
            .img-counter { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🧸 老婆专属空间</h1>
        <div class="upload-btn-wrapper">
            <button class="btn">上传新照片</button>
            <input type="file" id="fileUpload" accept="image/*" multiple />
        </div>
    </header>

    <main class="gallery" id="gallery"></main>

    <div class="modal" id="imageModal">
        <span class="close-btn" id="closeModal">&times;</span>
        <div class="nav-btn nav-prev" id="prevBtn">&#10094;</div>
        
        <div class="modal-content-wrapper" id="modalWrapper">
            <img id="modalImage" src="" alt="放大预览">
        </div>

        <div class="nav-btn nav-next" id="nextBtn">&#10095;</div>
        
        <div class="modal-toolbar">
            <span class="img-counter" id="imgCounter">1 / 1</span>
            <div class="toolbar-divider"></div>
            <span class="toolbar-item" id="zoomInBtn">🔍 <span class="tb-text">放大</span></span>
            <span class="toolbar-item" id="zoomOutBtn">🔎 <span class="tb-text">缩小</span></span>
            <div class="toolbar-divider"></div>
            <span class="toolbar-item" id="downloadBtn">📥 <span class="tb-text">原图</span></span>
        </div>
    </div>

<script>
    // ==========================================
    // 1. Gitee 图床配置区
    // ==========================================
    const GITEE_CONFIG = {
        owner: 'hx_a',   
        repo: 'baby-album',  
        path: 'img',                
        token: '54b57d61c8bbd89012c5702a0123e177'  
    };

    const gallery = document.getElementById('gallery');
    const fileInput = document.getElementById('fileUpload');
    const uploadBtn = document.querySelector('.btn');

    // ==========================================
    // 2. 加载与上传功能 (保持原样)
    // ==========================================
    async function loadImagesFromGitee() {
        gallery.innerHTML = '<p style="text-align:center; width:100%; color:#888; padding-top:20px;">正在加载宝宝相册...</p>';
        const url = `https://gitee.com/api/v5/repos/${GITEE_CONFIG.owner}/${GITEE_CONFIG.repo}/contents/${GITEE_CONFIG.path}?access_token=${GITEE_CONFIG.token}`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) {
                if (response.status === 404) gallery.innerHTML = '<p style="text-align:center; width:100%; color:#888;">空空如也，快上传第一张照片吧！</p>';
                else throw new Error('获取图片列表失败');
                return;
            }
            const files = await response.json();
            gallery.innerHTML = ''; 
            const imageFiles = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
            if (imageFiles.length === 0) {
                gallery.innerHTML = '<p style="text-align:center; width:100%; color:#888;">图床里还没有图片哦~</p>';
                return;
            }
            imageFiles.reverse().forEach(file => renderImageToGallery(file.download_url));
        } catch (error) {
            console.error(error);
            gallery.innerHTML = '<p style="text-align:center; width:100%; color:red;">加载失败，请检查配置。</p>';
        }
    }

    fileInput.addEventListener('change', async function(e) {
        const files = e.target.files; 
        if (files.length === 0) return;

        const originalText = uploadBtn.innerText;
        uploadBtn.style.pointerEvents = 'none'; 
        let successCount = 0, failCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            uploadBtn.innerText = `上传中... (${i + 1}/${files.length})`;

            try {
                const base64Content = await getBase64(file);
                const ext = file.name.substring(file.name.lastIndexOf("."));
                const newFileName = new Date().getTime() + "_" + i + "_" + Math.floor(Math.random() * 1000) + ext;
                const uploadUrl = `https://gitee.com/api/v5/repos/${GITEE_CONFIG.owner}/${GITEE_CONFIG.repo}/contents/${GITEE_CONFIG.path}/${newFileName}`;
                
                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_token: GITEE_CONFIG.token,
                        content: base64Content,
                        message: `Upload photo: ${newFileName}` 
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    renderImageToGallery(result.content.download_url, true);
                    successCount++;
                } else failCount++;
            } catch (error) { failCount++; }
        } 
        uploadBtn.innerText = originalText;
        uploadBtn.style.pointerEvents = 'auto';
        e.target.value = ''; 
        if (failCount === 0) alert(`太棒了！${successCount} 张照片上传成功！`);
        else alert(`成功 ${successCount} 张，失败 ${failCount} 张。`);
    });

    function renderImageToGallery(imgUrl, isNew = false) {
        const newDiv = document.createElement('div');
        newDiv.className = 'gallery-item';
        const newImg = document.createElement('img');
        newImg.src = imgUrl;
        newImg.loading = "lazy"; // 开启原生懒加载，优化手机流量和内存
        newDiv.appendChild(newImg);
        if (isNew) gallery.prepend(newDiv);
        else gallery.appendChild(newDiv);
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    window.onload = loadImagesFromGitee;

    // ==========================================
    // 3. 看图器逻辑 (新增手机端手势、双击缩放)
    // ==========================================
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const modalWrapper = document.getElementById('modalWrapper');
    
    let currentImageArray = [];
    let currentIndex = 0;
    let currentZoom = 1;

    gallery.addEventListener('click', function(e) {
        if (e.target.tagName === 'IMG') {
            const imgs = Array.from(document.querySelectorAll('.gallery-item img'));
            currentImageArray = imgs.map(img => img.src);
            currentIndex = imgs.indexOf(e.target);
            updateModalView();
            modal.classList.add('show');
        }
    });

    function updateModalView() {
        currentZoom = 1;
        modalImg.style.transform = `scale(${currentZoom})`;
        modalImg.src = currentImageArray[currentIndex];
        document.getElementById('imgCounter').innerText = `${currentIndex + 1} / ${currentImageArray.length}`;
    }

    function showPrev() {
        if(currentImageArray.length === 0) return;
        currentIndex = (currentIndex - 1 + currentImageArray.length) % currentImageArray.length;
        updateModalView();
    }
    
    function showNext() {
        if(currentImageArray.length === 0) return;
        currentIndex = (currentIndex + 1) % currentImageArray.length;
        updateModalView();
    }

    document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); showPrev(); });
    document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); showNext(); });

    function closeModalAction() {
        modal.classList.remove('show');
        setTimeout(() => { modalImg.src = ''; }, 300); 
    }
    
    document.getElementById('closeModal').addEventListener('click', closeModalAction);
    modalWrapper.addEventListener('click', function(e) {
        // 只有点击背景时才关闭，点击图片本身不关闭
        if (e.target === modalWrapper) closeModalAction();
    });

    // 键盘支持 (PC端)
    document.addEventListener('keydown', function(e) {
        if (!modal.classList.contains('show')) return;
        if (e.key === 'ArrowLeft') showPrev();
        if (e.key === 'ArrowRight') showNext();
        if (e.key === 'Escape') closeModalAction();
    });

    // 缩放功能 (按钮控制)
    function applyZoom(newZoom) {
        currentZoom = Math.min(Math.max(0.5, newZoom), 4);
        modalImg.style.transform = `scale(${currentZoom})`;
    }
    document.getElementById('zoomInBtn').addEventListener('click', (e) => { e.stopPropagation(); applyZoom(currentZoom + 0.3); });
    document.getElementById('zoomOutBtn').addEventListener('click', (e) => { e.stopPropagation(); applyZoom(currentZoom - 0.3); });
    modalImg.addEventListener('wheel', e => {
        e.preventDefault();
        applyZoom(e.deltaY < 0 ? currentZoom + 0.1 : currentZoom - 0.1);
    });

    // ================= 新增：移动端触控事件 (滑动切换 & 双击放大) =================
    let touchStartX = 0;
    let touchEndX = 0;
    let lastTapTime = 0;

    modalImg.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.changedTouches[0].screenX;
        }
    });

    modalImg.addEventListener('touchend', e => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTapTime;
        
        // 1. 双击判断 (两次点击间隔小于300ms)
        if (tapLength > 0 && tapLength < 300) {
            e.preventDefault();
            if (currentZoom === 1) applyZoom(2); // 双击放大
            else applyZoom(1);                   // 再次双击恢复
        } else {
            // 2. 滑动判断 (只在未放大时允许左右滑动切换)
            if (currentZoom === 1 && e.changedTouches.length === 1) {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }
        }
        lastTapTime = currentTime;
    });

    function handleSwipe() {
        const swipeThreshold = 40; // 滑动触发距离(px)
        if (touchEndX < touchStartX - swipeThreshold) showNext(); // 左滑看下一张
        if (touchEndX > touchStartX + swipeThreshold) showPrev(); // 右滑看上一张
    }

    // 下载原图功能
    document.getElementById('downloadBtn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const url = currentImageArray[currentIndex];
        const btnTextSpan = document.querySelector('#downloadBtn .tb-text');
        const originalText = btnTextSpan ? btnTextSpan.innerText : '';
        if(btnTextSpan) btnTextSpan.innerText = "打包中";
        
        try {
            const response = await fetch(url);
            const blob = await response.blob();
            const blobUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = url.substring(url.lastIndexOf('/') + 1) || 'baby_photo.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(blobUrl);
        } catch (error) {
            window.open(url, '_blank'); 
        } finally {
            if(btnTextSpan) btnTextSpan.innerText = originalText;
        }
    });

</script>
</body>
</html>
